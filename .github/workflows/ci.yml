name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install
        run: uv sync

      - name: Lint
        run: uv run ruff check src/

      - name: Smoke test
        run: |
          uv run anno --help
          uv run anno ink --help
          uv run anno mind --help
